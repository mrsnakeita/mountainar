<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mountain AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1628;font-family:system-ui,sans-serif;color:#fff;overflow:hidden;height:100dvh;width:100vw}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}

#start{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,#0a1628,#0d2a40);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
#start h1{font-size:36px;font-weight:900;letter-spacing:4px;margin:16px 0 8px}
#start h1 span{color:#38bdf8}
#start p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.7;margin-bottom:32px}
#startBtn{background:linear-gradient(135deg,#38bdf8,#0284c7);border:none;border-radius:50px;
  padding:18px 48px;font-size:17px;font-weight:700;color:#fff;cursor:pointer;
  box-shadow:0 8px 32px rgba(56,189,248,.35)}

#hudTop{position:absolute;top:0;left:0;right:0;padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.65),transparent);
  display:flex;justify-content:space-between;align-items:flex-start}
#logo{font-size:18px;font-weight:800;letter-spacing:2px}
#logo span{color:#38bdf8}
#info{font-size:10px;color:rgba(255,255,255,.75);text-align:right;line-height:1.8}

#compassWrap{position:absolute;top:58px;left:50%;transform:translateX(-50%);width:260px;text-align:center}
#compassOuter{overflow:hidden;white-space:nowrap;position:relative;height:16px}
#compassLine{display:inline-block;font-size:11px;color:rgba(255,255,255,.65);letter-spacing:2px}
#compassCursor{width:2px;height:16px;background:#38bdf8;position:absolute;top:0;left:50%;transform:translateX(-50%)}
#compassDeg{font-size:13px;font-weight:700;color:#38bdf8;margin-top:3px}

#radarWrap{position:absolute;bottom:70px;right:14px}

#hudBot{position:absolute;bottom:0;left:0;right:0;padding:10px 16px 22px;
  background:linear-gradient(to top,rgba(0,0,0,.65),transparent)}
#statusTxt{font-size:12px;color:rgba(255,255,255,.65);text-align:center}

.lbl{position:absolute;transform:translate(-50%,-100%);pointer-events:auto;cursor:pointer}
.lbl-box{background:rgba(0,20,45,.82);border:1px solid rgba(56,189,248,.55);border-radius:10px;
  padding:6px 11px;text-align:center;backdrop-filter:blur(6px);min-width:88px;position:relative}
.lbl-box::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:rgba(56,189,248,.55)}
.lbl-name{font-size:11px;font-weight:700;white-space:nowrap}
.lbl-alt{font-size:15px;font-weight:900;color:#38bdf8}
.lbl-dist{font-size:9px;color:rgba(255,255,255,.5);margin-top:1px}
.lbl-dot{width:6px;height:6px;background:#38bdf8;border-radius:50%;margin:3px auto 0;box-shadow:0 0 6px #38bdf8}

#panel{position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:rgba(0,15,35,.96);border-top:1px solid rgba(56,189,248,.35);
  border-radius:20px 20px 0 0;padding:22px;
  transform:translateY(110%);transition:transform .3s ease;pointer-events:auto}
#panel.open{transform:translateY(0)}
#panelClose{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);
  border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer}
#pName{font-size:22px;font-weight:800;margin-bottom:3px}
#pChain{font-size:12px;color:#38bdf8;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cell{background:rgba(255,255,255,.05);border-radius:10px;padding:11px}
.clabel{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px}
.cval{font-size:18px;font-weight:800;color:#38bdf8;margin-top:3px}

#manualBtns{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  z-index:10;display:none;gap:16px;pointer-events:auto}
#manualBtns button{background:rgba(56,189,248,.15);border:1px solid #38bdf8;
  color:#fff;padding:14px 22px;border-radius:12px;font-size:20px;cursor:pointer}
</style>
</head>
<body>

<div id="start">
  <div style="font-size:60px">🏔️</div>
  <h1>MOUNTAIN<span>AR</span></h1>
  <p>Punta la fotocamera verso le montagne e scopri<br>nome, altezza e distanza in realtà aumentata.</p>
  <button id="startBtn" onclick="onAvvia()">▶ AVVIA</button>
  <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:14px;line-height:1.8">
    Richiede: 📍 GPS &nbsp; 📷 Fotocamera &nbsp; 🧭 Bussola<br>
    <span style="color:#fbbf24">⚠️ Usare Safari su iPhone</span>
  </div>
</div>

<video id="vid" autoplay playsinline muted></video>

<div id="overlay">
  <div id="hudTop">
    <div id="logo">MTN<span>AR</span></div>
    <div id="info">
      <div id="iGps"></div>
      <div id="iHead"></div>
      <div id="iCount"></div>
    </div>
  </div>
  <div id="compassWrap">
    <div id="compassOuter">
      <div id="compassLine"></div>
      <div id="compassCursor"></div>
    </div>
    <div id="compassDeg">—°</div>
  </div>
  <div id="radarWrap"><canvas id="radar" width="76" height="76" style="border-radius:50%;border:1px solid rgba(56,189,248,.3)"></canvas></div>
  <div id="hudBot"><div id="statusTxt">—</div></div>
</div>

<div id="manualBtns">
  <button ontouchstart="startTurn(-1)" ontouchend="stopTurn()">◀</button>
  <button ontouchstart="startTurn(1)"  ontouchend="stopTurn()">▶</button>
</div>

<div id="panel">
  <button id="panelClose" onclick="closePanel()">✕</button>
  <div id="pName">—</div><div id="pChain">—</div>
  <div class="grid">
    <div class="cell"><div class="clabel" id="lAlt"></div><div class="cval" id="pAlt">—</div></div>
    <div class="cell"><div class="clabel" id="lDist"></div><div class="cval" id="pDist">—</div></div>
    <div class="cell"><div class="clabel" id="lCountry"></div><div class="cval" id="pCountry" style="font-size:13px">—</div></div>
    <div class="cell"><div class="clabel" id="lAz"></div><div class="cval" id="pAz">—</div></div>
  </div>
</div>

    directions:['北','北北东','北东','东北东','东','东南东','南东','南南东','南','南南西','南西','西南西','西','西北西','北西','北北西'],
    compass:'北 · · 东北 · · 东 · · 东南 · · 南 · · 西南 · · 西 · · 西北 · · 北 · · 东北 · · 东'
  }
};
// Fallback inglese per lingue non supportate
var i18n = T[LANG] || T['en'];
// RTL per arabo
if(i18n.rtl){ document.documentElement.setAttribute('dir','rtl'); }

// ── APPLICA LINGUA ALL'AVVIO ──────────────────────────────────────────────
function applyI18n(){
  document.getElementById('appTitle').innerHTML = i18n.title;
  document.getElementById('appSubtitle').textContent = i18n.subtitle;
  document.getElementById('startBtn').textContent = i18n.start;
  document.getElementById('appPerms').innerHTML = i18n.perms;
  document.getElementById('appSafari').textContent = i18n.safari;
  document.getElementById('iGps').textContent = i18n.gps;
  document.getElementById('iHead').textContent = i18n.dir;
  document.getElementById('iCount').textContent = i18n.peaks;
  document.getElementById('compassLine').textContent = i18n.compass;
  document.getElementById('lAlt').textContent = i18n.altitude;
  document.getElementById('lDist').textContent = i18n.distance;
  document.getElementById('lCountry').textContent = i18n.country;
  document.getElementById('lAz').textContent = i18n.azimuth;
}
applyI18n();
function bearing(la1,lo1,la2,lo2){
  var f1=la1*Math.PI/180,f2=la2*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  return ((Math.atan2(Math.sin(dl)*Math.cos(f2),
    Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl))*180/Math.PI)+360)%360;
}
function haversine(la1,lo1,la2,lo2){
  var R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function angDiff(a,b){ var d=((a-b)+360)%360; return d>180?d-360:d; }
function dirName(h){ return i18n.directions[Math.round(h/22.5)%16]; }

function t(key, vars){
  var s = i18n[key] || key;
  if(vars) Object.keys(vars).forEach(function(k){ s = s.replace('{'+k+'}', vars[k]); });
  return s;
}

// ── AVVIA — tutto sincrono nel tap, come il debug ─────────────────────────
function onAvvia(){
  // 1. Chiedi permesso bussola SUBITO (stesso tap, niente await prima)
  if(typeof DeviceOrientationEvent !== 'undefined' &&
     typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(function(r){
      if(r === 'granted'){
        window.addEventListener('deviceorientation', onOrient, true);
        setStatus(i18n.compassOk);
      } else {
        showManual();
      }
      afterPermission();
    }).catch(function(){ showManual(); afterPermission(); });
  } else {
    // Android o browser senza requestPermission
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
    afterPermission();
  }
}

function onOrient(e){
  var deg = (e.webkitCompassHeading != null) ? e.webkitCompassHeading : (360 - e.alpha) % 360;
  if(deg == null || isNaN(deg)) return;
  var d = angDiff(deg, S.heading);
  S.heading = (S.heading + d * 0.2 + 360) % 360;
}

function afterPermission(){
  document.getElementById('start').style.display = 'none';
  setStatus(i18n.camera);
  if(navigator.mediaDevices){
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
      .then(function(stream){
        document.getElementById('vid').srcObject = stream;
        setStatus(i18n.gpsAcq);
      }).catch(function(){
        document.getElementById('vid').style.display = 'none';
        setStatus(i18n.gpsAcq);
      });
  }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(p){
      S.lat = p.coords.latitude;
      S.lon = p.coords.longitude;
      document.getElementById('iGps').textContent = S.lat.toFixed(3)+', '+S.lon.toFixed(3);
      loadPeaks();
    }, function(err){
      S.lat = 45.464; S.lon = 9.190;
      document.getElementById('iGps').textContent = i18n.demo;
      loadPeaks();
    }, {enableHighAccuracy: true, timeout: 15000, maximumAge: 0});
  } else {
    S.lat = 45.464; S.lon = 9.190;
    loadPeaks();
  }
  // Avvia loop grafica
  requestAnimationFrame(loop);
}

// ── PEAKS — Overpass mondiale, raggio 20km, tutte le cime ────────────────
function loadPeaks(){
  setStatus(i18n.loadingPeaks);
  var RADIUS = 20000;
  var MIN_ELE = 200;
  // Preferisce il nome nella lingua del dispositivo, poi inglese, poi nome locale
  var nameLang = 'name:' + LANG;
  var q = '[out:json][timeout:25];'
    + 'node["natural"="peak"]["ele"](around:' + RADIUS + ',' + S.lat + ',' + S.lon + ');'
    + 'out 1000;';
  var ctrl = new AbortController();
  setTimeout(function(){ ctrl.abort(); }, 20000);
  fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(q), {signal:ctrl.signal})
    .then(function(r){ return r.json(); })
    .then(function(d){
      var peaks = d.elements
        .filter(function(e){ return e.tags && e.tags.ele && parseFloat(e.tags.ele) >= MIN_ELE; })        .map(function(e){
          return {
            // Nome nella lingua del dispositivo → inglese → nome locale
            n: e.tags[nameLang] || e.tags['name:en'] || e.tags.name || i18n.unnamed,
            a: Math.round(parseFloat(e.tags.ele)),
            lat: e.lat, lon: e.lon,
            c: e.tags['addr:country'] || '',
            ch: e.tags.mountain_range || e.tags['name:it'] || '',
            dist: haversine(S.lat, S.lon, e.lat, e.lon),
            az: bearing(S.lat, S.lon, e.lat, e.lon)
          };
        })
        .filter(function(m){ return m.dist <= 150; })
        .sort(function(a,b){ return a.dist - b.dist; });

      if(peaks.length === 0){
        setStatus(i18n.noPeaks);
        S.mountains = [];
        document.getElementById('iCount').textContent = i18n.peaks;
        return;
      }
      S.mountains = peaks;
      document.getElementById('iCount').textContent = i18n.peaks.split(':')[0] + ': ' + peaks.length;
      setStatus(t('found', {n: peaks.length}));
      setTimeout(function(){ setStatus(''); }, 3000);
    })
    .catch(function(e){
      // Overpass non raggiungibile: fallback DB locale filtrato per distanza
      var fallback = DB.map(function(m){
        return {n:m.n,a:m.a,lat:m.lat,lon:m.lon,c:m.c,ch:m.ch,
          dist:haversine(S.lat,S.lon,m.lat,m.lon),
          az:bearing(S.lat,S.lon,m.lat,m.lon)};
      }).filter(function(m){ return m.dist <= 20; })
        .sort(function(a,b){ return a.dist-b.dist; });
      S.mountains = fallback;
      document.getElementById('iCount').textContent = i18n.peaks.split(':')[0] + ': ' + fallback.length;
      setStatus(t('offline', {n: fallback.length}));
      setTimeout(function(){ setStatus(''); }, 4000);
    });
}

// ── LOOP ──────────────────────────────────────────────────────────────────
function loop(){
  renderCompass();
  renderLabels();
  renderRadar();
  requestAnimationFrame(loop);
}

function renderCompass(){
  var h = Math.round(S.heading);
  document.getElementById('compassDeg').textContent = h+'° '+dirName(h);
  document.getElementById('iHead').textContent = i18n.dir.split(':')[0] + ': ' + h + '° ' + dirName(h);
  document.getElementById('compassLine').style.transform = 'translateX('+(-(h/360*420))+'px)';
}

function renderLabels(){
  document.querySelectorAll('.lbl').forEach(function(e){ e.remove(); });
  var W=window.innerWidth, H=window.innerHeight;
  var vis = S.mountains.filter(function(m){ return Math.abs(angDiff(m.az,S.heading)) < FOV/2+8; });
  vis.slice(0,10).forEach(function(m){
    var diff = angDiff(m.az, S.heading);
    var x = W*(0.5 + diff/FOV);
    var y = H*(0.28 + Math.min(m.dist/180,1)*0.38);
    var el = document.createElement('div');
    el.className = 'lbl';
    el.style.left = x+'px';
    el.style.top = y+'px';
    var ds = m.dist<1 ? Math.round(m.dist*1000)+'m' : Math.round(m.dist)+'km';
    el.innerHTML = '<div class="lbl-box"><div class="lbl-name">'+m.n+'</div>'
      +'<div class="lbl-alt">'+m.a.toLocaleString()+' m</div>'
      +'<div class="lbl-dist">'+ds+'</div></div>'
      +'<div class="lbl-dot"></div>';
    el.addEventListener('click', function(){ openPanel(m); });
    document.getElementById('overlay').appendChild(el);
  });
}

function renderRadar(){
  var cv=document.getElementById('radar'),ctx=cv.getContext('2d');
  var cx=38,cy=38,r=34,D2R=Math.PI/180;
  ctx.clearRect(0,0,76,76);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,15,35,.75)';ctx.fill();
  [.33,.66,1].forEach(function(s){
    ctx.beginPath();ctx.arc(cx,cy,r*s,0,Math.PI*2);
    ctx.strokeStyle='rgba(56,189,248,.15)';ctx.lineWidth=1;ctx.stroke();
  });
  var hr=(S.heading-90)*D2R, fv=(FOV/2)*D2R;
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,hr-fv,hr+fv);ctx.closePath();
  ctx.fillStyle='rgba(56,189,248,.12)';ctx.fill();
  S.mountains.forEach(function(m){
    var az=(m.az-90)*D2R, d=Math.min(m.dist/200,1)*r*.88;
    var mx=cx+Math.cos(az)*d, my=cy+Math.sin(az)*d;
    var inV=Math.abs(angDiff(m.az,S.heading))<FOV/2;
    ctx.beginPath();ctx.arc(mx,my,inV?2.5:1.5,0,Math.PI*2);
    ctx.fillStyle=inV?'#38bdf8':'rgba(255,255,255,.3)';ctx.fill();
  });
  ctx.fillStyle='#38bdf8';ctx.font='8px system-ui';ctx.textAlign='center';
  ctx.fillText('N',cx,cy-r+9);
}

// ── PANEL ─────────────────────────────────────────────────────────────────
function openPanel(m){
  document.getElementById('pName').textContent = m.n;
  document.getElementById('pChain').textContent = m.ch||'—';
  document.getElementById('pAlt').textContent = m.a.toLocaleString()+' m';
  var ds = m.dist<1 ? Math.round(m.dist*1000)+' m' : m.dist.toFixed(1)+' km';
  document.getElementById('pDist').textContent = ds;
  document.getElementById('pCountry').textContent = m.c||'—';
  document.getElementById('pAz').textContent = Math.round(m.az)+'°';
  document.getElementById('panel').classList.add('open');
}
function closePanel(){ document.getElementById('panel').classList.remove('open'); }

// ── MANUAL ────────────────────────────────────────────────────────────────
function showManual(){
  document.getElementById('manualBtns').style.display = 'flex';
  setStatus(i18n.compassNo);
}
function startTurn(d){ S.turnTimer = setInterval(function(){ S.heading=(S.heading+d*1.5+360)%360; },30); }
function stopTurn(){ clearInterval(S.turnTimer); }
function toggleHelp(){ var h=document.getElementById('helpBox'); h.style.display=h.style.display==='none'?'block':'none'; }
function setStatus(t){ document.getElementById('statusTxt').textContent = t; }
</script>
